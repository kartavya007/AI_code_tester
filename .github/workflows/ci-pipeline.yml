name: AI Code Tester CI Pipeline

# on:
#   push:
#     branches: [master, ci-cd-setup]
#   pull_request:
#     branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: AI_KEY

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pip packages
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Playwright browsers
        run: |
          pip install playwright
          playwright install --with-deps

      - name: Verify Environment Configuration
        env:
          GROQ_API_KEY_SECRET: ${{ secrets.GROQ_API_KEY }}
          AI_MODEL_SECRET: ${{ secrets.AI_MODEL }}
          AI_MODEL_VAR: ${{ vars.AI_MODEL }}
        run: |
          echo "=== Diagnostic Check ==="
          if [ -z "$GROQ_API_KEY_SECRET" ]; then
            echo "❌ GROQ_API_KEY is missing from Secrets!"
          else
            echo "✅ GROQ_API_KEY is loaded successfully."
          fi

          if [ -n "$AI_MODEL_SECRET" ]; then
            echo "✅ AI_MODEL found in Secrets (Length: ${#AI_MODEL_SECRET} chars)."
          elif [ -n "$AI_MODEL_VAR" ]; then
            echo "⚠️ AI_MODEL found in Variables instead of Secrets (Length: ${#AI_MODEL_VAR} chars)."
          else
            echo "❌ AI_MODEL is completely missing from both Secrets and Variables!"
          fi
          echo "========================"

      # This step handles running the script using the available secret configurations
      - name: Run main.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # This fallback syntax ensures it tries secrets first, then variables
          # AI_MODEL: '${{ secrets.AI_MODEL }}'
        run: |
          python main.py