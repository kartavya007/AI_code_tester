name: AI Code Tester CI Pipeline

on:
  push:
    branches: [ master, ci-cd-setup ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    # Tells GitHub to pull secrets from your specific environment
    environment: AI_KEY 

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install pip packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Playwright browsers
      run: |
        playwright install
    
    - name: load environment secrets
      env: |
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }
          AI_MODEL=${{ secrets.AI_MODEL }}

    # Creates the .env file right before running the code
    - name: Create .env file
      run: |
        echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
        echo "AI_MODEL=${{ secrets.AI_MODEL }}" >> .env
    
    # Your script will now automatically read from the created .env file
    - name: Run main.py
      run: |
        python main.py
